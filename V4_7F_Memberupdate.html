// ─── Dependency loader ──────────────────────────────────────────────────
// Loads React, ReactDOM, and Babel from cdnjs in sequence and only proceeds
// once all three are confirmed available as globals. This avoids race
// conditions where the "text/babel" script runs before Babel is ready.

(function() {
  const stage = document.getElementById('boot-stage');
  function setStage(msg) { if (stage) stage.textContent = msg; }

  function showFailure(title, detail) {
    const root = document.getElementById('root');
    root.innerHTML = ''
      + '<div class="boot-fail">'
      +   '<h2>' + title + '</h2>'
      +   '<p>The diagnostic could not load. This almost always means a required script was blocked by your network, firewall, browser extension, or ad blocker.</p>'
      +   '<p>Try: disabling ad blockers for this page, checking your internet connection, or opening the file in a different browser.</p>'
      +   '<p style="margin-top:20px;">If you are opening this file directly from your computer (not from a web address), some browsers block scripts by default. Try uploading the file to a free host like <code>netlify.com/drop</code> first.</p>'
      +   (detail ? '<div class="detail">' + detail + '</div>' : '')
      + '</div>';
  }

  function loadScript(url, globalCheck) {
    return new Promise(function(resolve, reject) {
      if (globalCheck && globalCheck()) return resolve();
      const s = document.createElement('script');
      s.src = url;
      s.crossOrigin = 'anonymous';
      s.onload = function() {
        if (!globalCheck || globalCheck()) resolve();
        else reject(new Error('loaded but global missing: ' + url));
      };
      s.onerror = function() { reject(new Error('failed to load: ' + url)); };
      document.head.appendChild(s);
    });
  }

  setStage('Loading React');
  loadScript(
    'https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js',
    function() { return typeof React !== 'undefined'; }
  ).then(function() {
    setStage('Loading ReactDOM');
    return loadScript(
      'https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js',
      function() { return typeof ReactDOM !== 'undefined'; }
    );
  }).then(function() {
    setStage('Loading Babel compiler');
    return loadScript(
      'https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js',
      function() { return typeof Babel !== 'undefined'; }
    );
  }).then(function() {
    setStage('Compiling');
    // Babel is loaded but it processes <script type="text/babel"> tags on
    // DOMContentLoaded. Since we're after that event already, we need to
    // compile manually.
    const source = document.getElementById('app-source').textContent;
    let compiled;
    try {
      compiled = Babel.transform(source, { presets: ['react'] }).code;
    } catch (err) {
      showFailure('Compilation error', String(err && err.message || err));
      return;
    }

    setStage('Rendering');
    try {
      // Evaluate the compiled code, which defines App and then mounts it.
      const appFn = new Function(compiled);
      appFn();
    } catch (err) {
      showFailure('Runtime error', String(err && err.message || err));
      return;
    }
  }).catch(function(err) {
    showFailure('Unable to load dependencies', String(err && err.message || err));
  });
})();
</script>

// BROWSER STORAGE SHIM
// ─────────────────────────────────────────────────────────────────────────
// The Claude-artifacts version of this tool uses `window.storage` (an async
// key/value API). In the browser we back that same API with localStorage so
// the rest of the code keeps working unchanged.
// ═══════════════════════════════════════════════════════════════════════════
if (typeof window !== 'undefined' && !window.storage) {
  window.storage = {
    async get(key) {
      const v = localStorage.getItem(key);
      return v === null ? null : { key, value: v };
    },
    async set(key, value) {
      localStorage.setItem(key, value);
      return { key, value };
    },
    async delete(key) {
      const existed = localStorage.getItem(key) !== null;
      localStorage.removeItem(key);
      return { key, deleted: existed };
    },
    async list(prefix) {
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (!prefix || k.startsWith(prefix)) keys.push(k);
      }
      return { keys, prefix };
    },
  };
}

// Helper: look up tension record for a frequency pair (symmetric lookup)
function getTension(a, b) {
  return TENSIONS[`${a}-${b}`] || TENSIONS[`${b}-${a}`] || null;
}

// Helper: get the display payload for a tension given a mode.
// ─────────────────────────────────────────────────────────────
// "tensions" mode  → returns tension.dtm (Dynamic Tension Matrix: what's between two frequencies)
// "dynamics" mode  → returns tension.tdcm (Team Dynamics Coaching Matrix: how a team lives it)
// Both voices are canonical and team-native.
//
// Returns null if the tension has no payload for the requested mode.
// Shape of returned object depends on mode:
//   tensions: { mode:"tensions", title, subtitle, body, friction, synthesis, watch, isDraft }
//   dynamics: { mode:"dynamics", title, subtitle, dynamic, coaching, teamrisk, teamgain, coachtip, isDraft:false }
function getTensionContent(tension, mode) {
  if (!tension) return null;

  if (mode === "dynamics") {
    if (!tension.tdcm) return null;
    return {
      mode: "dynamics",
      title:    tension.tdcm.title,
      subtitle: tension.tdcm.subtitle,
      dynamic:  tension.tdcm.dynamic,
      coaching: tension.tdcm.coaching,
      teamrisk: tension.tdcm.teamrisk,
      teamgain: tension.tdcm.teamgain,
      coachtip: tension.tdcm.coachtip,
      isDraft: false, // TDCM is canonical
    };
  }

  // tensions mode (default)
  if (!tension.dtm) return null;
  return {
    mode: "tensions",
    title:     tension.dtm.title,
    subtitle:  tension.dtm.subtitle,
    body:      tension.dtm.body,
    friction:  tension.dtm.friction,
    synthesis: tension.dtm.synthesis,
    watch:     tension.dtm.watch,
    isDraft:   tension.dtm._draft === true,
  };
}

// COMPUTATION
// ═══════════════════════════════════════════════════════════════════════════

function computeTensionGrid(members) {
  const grid = {};
  FREQ.forEach(fa => FREQ.forEach(fb => { grid[`${fa.id}-${fb.id}`] = 0; }));

  if (members.length < 2) return { grid, max: 0 };

  for (let a = 0; a < members.length; a++) {
    for (let b = a + 1; b < members.length; b++) {
      const A = members[a].scores;
      const B = members[b].scores;
      for (let i = 0; i < FREQ.length; i++) {
        for (let j = 0; j < FREQ.length; j++) {
          const f1 = FREQ[i].id;
          const f2 = FREQ[j].id;
          if (i === j) {
            grid[`${f1}-${f2}`] += (A[f1] * B[f1]) / 100;
          } else if (i < j) {
            const contrib = (A[f1] * B[f2] + A[f2] * B[f1]) / 100;
            grid[`${f1}-${f2}`] += contrib;
            grid[`${f2}-${f1}`] += contrib;
          }
        }
      }
    }
  }

  let max = 0;
  Object.values(grid).forEach(v => { if (v > max) max = v; });
  return { grid, max };
}

function computeTeamSignature(members, gridData) {
  if (members.length === 0) return null;

  const avg = {};
  FREQ.forEach(f => {
    const sum = members.reduce((s, m) => s + (m.scores[f.id] || 0), 0);
    avg[f.id] = sum / members.length;
  });

  const present = FREQ.filter(f => avg[f.id] >= 50);
  const absent  = FREQ.filter(f => avg[f.id] < 30);

  const mirrors = [];
  FREQ.forEach(f => {
    const carriers = members.filter(m => {
      const dom = FREQ.reduce((best, ff) => (m.scores[ff.id] > (m.scores[best.id] || 0)) ? ff : best, FREQ[0]);
      return dom.id === f.id && m.scores[f.id] >= 60;
    });
    if (carriers.length >= 2) mirrors.push({ freq: f, carriers });
  });

  const typeLoad = { amp:0, con:0, cat:0, sta:0, dis:0, mir:0 };
  if (gridData.max > 0) {
    Object.entries(gridData.grid).forEach(([key, val]) => {
      const [f1, f2] = key.split("-");
      if (FREQ.findIndex(f => f.id === f1) > FREQ.findIndex(f => f.id === f2)) return;
      const t = getTension(f1, f2);
      if (t) typeLoad[t.type] += val / gridData.max;
    });
  }
  const dominantType = Object.entries(typeLoad).sort((a, b) => b[1] - a[1])[0][0];

  return { avg, present, absent, mirrors, typeLoad, dominantType };
}

function generateNarrative(sig, members) {
  if (!sig) return "";
  const presentNames = sig.present.map(f => f.name).join(", ") || "no dominant frequencies";
  const absentNames  = sig.absent.map(f => f.name).join(", ");
  const dominantName = T_NAMES[sig.dominantType];

  const parts = [];
  parts.push(`This team of ${members.length} carries ${presentNames} as its dominant frequencies.`);
  if (sig.absent.length > 0) {
    parts.push(`${absentNames} ${sig.absent.length === 1 ? "is" : "are"} notably absent, which shapes what this team can and cannot do.`);
  }
  if (sig.mirrors.length > 0) {
    const mirrorNames = sig.mirrors.map(m => m.freq.name).join(", ");
    parts.push(`Mirror dynamics are present in ${mirrorNames} — pay attention to how same-frequency pairs either amplify or stall each other.`);
  }
  parts.push(`The lived tension signature is ${dominantName}-dominant — this team's culture is primarily defined by ${dominantName.toLowerCase()} dynamics.`);
  return parts.join(" ");
}

function findCarriers(members, freqA, freqB) {
  if (freqA === freqB) {
    return members
      .map(m => ({ member: m, score: m.scores[freqA] || 0, color: FREQ_BY_ID[freqA].color, freqId: freqA }))
      .filter(c => c.score >= 60)
      .sort((a, b) => b.score - a.score)
      .slice(0, 6);
  }
  return members.map(m => {
    const a = m.scores[freqA] || 0;
    const b = m.scores[freqB] || 0;
    const freq = a >= b ? freqA : freqB;
    return { member: m, score: Math.max(a, b), color: FREQ_BY_ID[freq].color, freqId: freq };
  }).filter(c => c.score >= 60).sort((a, b) => b.score - a.score).slice(0, 5);
}

function MatrixView({ grid, max, active, setActive }) {
  return (
    <div style={{ overflowX: "auto", marginBottom: 24 }}>
      <table style={{ borderCollapse: "separate", borderSpacing: 4, margin: "0 auto" }}>
        <thead>
          <tr>
            <th style={{ width: 70 }}/>
            {FREQ.map(f => (
              <th key={f.id} style={{ width: 66, paddingBottom: 10, textAlign: "center" }}>
                <div style={{ width: 9, height: 9, borderRadius: "50%", background: f.color, margin: "0 auto 5px", boxShadow: `0 0 8px ${f.color}60` }}/>
                <div style={{ ...monoSmall, fontSize: 8, color: f.color }}>{f.id.toUpperCase()}</div>
              </th>
            ))}
          </tr>
        </thead>
        <tbody>
          {FREQ.map(rowF => (
            <tr key={rowF.id}>
              <td style={{ paddingRight: 10, textAlign: "right", width: 70 }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "flex-end", gap: 6 }}>
                  <div style={{ ...monoSmall, fontSize: 8, color: rowF.color }}>{rowF.id.toUpperCase()}</div>
                  <div style={{ width: 9, height: 9, borderRadius: "50%", background: rowF.color, boxShadow: `0 0 8px ${rowF.color}60` }}/>
                </div>
              </td>
              {FREQ.map(colF => {
                const tension = getTension(rowF.id, colF.id);
                if (!tension) return <td key={colF.id}><div style={{ width: 54, height: 54 }}/></td>;

                const cellWeight = max > 0 ? (grid[`${rowF.id}-${colF.id}`] || 0) / max : 0;
                const tcolor = T_COLORS[tension.type];
                const isActive = active && active.a === rowF.id && active.b === colF.id;
                const isSelf = rowF.id === colF.id;

                const intensityHex = Math.round((0.15 + cellWeight * 0.5) * 255).toString(16).padStart(2, "0");
                const borderHex = Math.round((0.1 + cellWeight * 0.55) * 255).toString(16).padStart(2, "0");

                return (
                  <td key={colF.id}>
                    <div
                      onClick={() => setActive({ a: rowF.id, b: colF.id })}
                      title={`${rowF.name} × ${colF.name} — ${T_NAMES[tension.type]}${isSelf ? " (Mirror)" : ""}`}
                      style={{
                        width: 54, height: 54, borderRadius: 8, cursor: "pointer",
                        background: isSelf
                          ? `${rowF.color}${intensityHex}`
                          : `linear-gradient(135deg, ${rowF.color}${intensityHex}, ${colF.color}${intensityHex})`,
                        border: `1px solid ${tcolor}${isActive ? "cc" : borderHex}`,
                        display: "flex", alignItems: "center", justifyContent: "center",
                        fontSize: 17, transition: "all 0.15s",
                        transform: isActive ? "scale(1.12)" : "scale(1)",
                        boxShadow: isActive ? `0 0 22px ${tcolor}66` : (cellWeight > 0.5 ? `0 0 12px ${tcolor}30` : "none"),
                        opacity: 0.35 + cellWeight * 0.65,
                      }}
                    >
                      <span style={{ color: tcolor, opacity: 0.5 + cellWeight * 0.5 }}>{T_ICONS[tension.type]}</span>
                    </div>
                  </td>
                );
              })}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function NetworkView({ members, setActive, active }) {
  const size = 540;
  const cx = size / 2, cy = size / 2;
  const radius = Math.min(200, size * 0.38);

  const positions = members.map((m, i) => {
    const angle = (i / members.length) * Math.PI * 2 - Math.PI / 2;
    return { x: cx + radius * Math.cos(angle), y: cy + radius * Math.sin(angle) };
  });

  const edges = [];
  for (let i = 0; i < members.length; i++) {
    for (let j = i + 1; j < members.length; j++) {
      let best = { weight: 0, a: null, b: null, type: null };
      for (let x = 0; x < FREQ.length; x++) {
        for (let y = x; y < FREQ.length; y++) {
          const f1 = FREQ[x].id, f2 = FREQ[y].id;
          const A = members[i].scores, B = members[j].scores;
          const weight = f1 === f2 ? (A[f1] * B[f1]) / 100 : (A[f1] * B[f2] + A[f2] * B[f1]) / 100;
          if (weight > best.weight) {
            const t = getTension(f1, f2);
            if (t) best = { weight, a: f1, b: f2, type: t.type };
          }
        }
      }
      if (best.weight > 0) edges.push({ from: i, to: j, ...best });
    }
  }

  const maxEdge = Math.max(...edges.map(e => e.weight), 1);

  return (
    <div style={{ display: "flex", justifyContent: "center", marginBottom: 24 }}>
      <svg width={size} height={size} style={{ maxWidth: "100%" }}>
        {edges.map((e, i) => {
          const p1 = positions[e.from], p2 = positions[e.to];
          const norm = e.weight / maxEdge;
          const color = T_COLORS[e.type];
          const isActive = active && ((active.a === e.a && active.b === e.b) || (active.a === e.b && active.b === e.a));
          return (
            <line key={i} x1={p1.x} y1={p1.y} x2={p2.x} y2={p2.y} stroke={color} strokeWidth={1 + norm * 3.5} strokeOpacity={isActive ? 0.95 : 0.3 + norm * 0.45} style={{ cursor: "pointer", transition: "all 0.15s" }} onClick={() => setActive({ a: e.a, b: e.b })} />
          );
        })}
        {members.map((m, i) => {
          const p = positions[i];
          const dominant = FREQ.reduce((best, f) => (m.scores[f.id] > (m.scores[best.id] || 0)) ? f : best, FREQ[0]);
          const secondary = FREQ.filter(f => f.id !== dominant.id).reduce((best, f) => (m.scores[f.id] > (m.scores[best.id] || 0)) ? f : best, FREQ[0]);
          return (
            <g key={m.id}>
              <circle cx={p.x} cy={p.y} r={26} fill={BG} stroke={secondary.color} strokeWidth={1.5} strokeOpacity={0.4} />
              <circle cx={p.x} cy={p.y} r={20} fill={dominant.color} fillOpacity={0.25} stroke={dominant.color} strokeWidth={2} />
              <text x={p.x} y={p.y + 4} textAnchor="middle" style={{ fill: TEXT, fontSize: 10, fontFamily: "Georgia, serif", fontStyle: "italic", pointerEvents: "none" }}>
                {m.name.split(" ").map(n => n[0]).join("").slice(0, 2)}
              </text>
              <text x={p.x} y={p.y + 44} textAnchor="middle" style={{ fill: TEXT_DIM, fontSize: 9, fontFamily: "Georgia, serif", pointerEvents: "none" }}>{m.name}</text>
            </g>
          );
        })}
      </svg>
    </div>
  );
}

          <div style={{ ...monoSmall, color: tc }}>{Math.round(weight * 100)}%</div>
        </div>
        <div style={{ height: 3, background: `${tc}15`, borderRadius: 2, overflow: "hidden" }}>
          <div style={{ height: "100%", width: `${weight * 100}%`, background: tc, boxShadow: `0 0 8px ${tc}` }}/>
        </div>
      </div>

      {carriers.length > 0 && (
        <div style={{ marginBottom: 20 }}>
          <div style={{ ...monoSmall, color: GOLD, marginBottom: 8 }}>
            {isMirror ? "Who carries this frequency" : "Who carries this tension"}
          </div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
            {carriers.map(c => (
              <div key={c.member.id} style={{ fontSize: 12, fontStyle: "italic", color: TEXT_DIM, padding: "4px 10px", background: PANEL_2, border: `1px solid ${c.color}40`, borderRadius: 14 }}>
                <span style={{ color: c.color }}>●</span> {c.member.name} <span style={{ color: TEXT_DIMMER, fontSize: 10 }}>({c.score})</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {mode === "tensions" ? <TensionsContent content={content} tc={tc} /> : <DynamicsContent content={content} tc={tc} />}
    </div>
  );
}

function TensionsContent({ content, tc }) {
  return (
    <>
      <p style={{ fontSize: 14.5, lineHeight: 1.8, color: "rgba(237,233,223,0.78)", marginBottom: 20 }}>{content.body}</p>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, borderTop: `1px solid ${BORDER}`, paddingTop: 16, marginBottom: 16 }}>
        <div>
          <div style={{ ...monoSmall, color: "#e8533a", marginBottom: 6 }}>Friction</div>
          <p style={{ fontSize: 13, lineHeight: 1.65, color: "rgba(237,233,223,0.5)", fontStyle: "italic" }}>{content.friction}</p>
        </div>
        <div>
          <div style={{ ...monoSmall, color: "#4db882", marginBottom: 6 }}>Synthesis</div>
          <p style={{ fontSize: 13, lineHeight: 1.65, color: "rgba(237,233,223,0.5)", fontStyle: "italic" }}>{content.synthesis}</p>
        </div>
      </div>
      <div style={{ background: PANEL_2, borderLeft: `3px solid ${GOLD}`, borderRadius: "0 8px 8px 0", padding: "14px 18px" }}>
        <div style={{ ...monoSmall, color: GOLD, marginBottom: 6 }}>Watch For</div>
        <p style={{ fontSize: 13, lineHeight: 1.7, color: "rgba(237,233,223,0.6)", fontStyle: "italic", margin: 0 }}>{content.watch}</p>
      </div>
    </>
  );
}

function DynamicsContent({ content, tc }) {
  return (
    <>
      <div style={{ ...monoSmall, color: GOLD, marginBottom: 6 }}>Team Dynamic</div>
      <p style={{ fontSize: 14, lineHeight: 1.75, color: "rgba(237,233,223,0.78)", marginBottom: 18 }}>{content.dynamic}</p>

      <div style={{ background: PANEL_2, borderRadius: 10, padding: "14px 18px", marginBottom: 14 }}>
        <div style={{ ...monoSmall, color: tc, marginBottom: 6 }}>Coaching Approach</div>
        <p style={{ fontSize: 13, lineHeight: 1.7, color: "rgba(237,233,223,0.7)", fontStyle: "italic", margin: 0 }}>{content.coaching}</p>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 14 }}>
        <div style={{ background: "rgba(232,83,58,0.07)", borderRadius: 8, padding: "12px" }}>
          <div style={{ ...monoSmall, color: "#e8533a", marginBottom: 4 }}>Team Risk</div>
          <p style={{ fontSize: 12.5, lineHeight: 1.6, color: "rgba(237,233,223,0.6)", fontStyle: "italic", margin: 0 }}>{content.teamrisk}</p>
        </div>
        <div style={{ background: "rgba(77,184,130,0.07)", borderRadius: 8, padding: "12px" }}>
          <div style={{ ...monoSmall, color: "#4db882", marginBottom: 4 }}>Team Gain</div>
          <p style={{ fontSize: 12.5, lineHeight: 1.6, color: "rgba(237,233,223,0.6)", fontStyle: "italic", margin: 0 }}>{content.teamgain}</p>
        </div>
      </div>

      <div style={{ background: PANEL_2, borderLeft: `3px solid ${GOLD}`, borderRadius: "0 8px 8px 0", padding: "14px 18px" }}>
        <div style={{ ...monoSmall, color: GOLD, marginBottom: 6 }}>Coach's Questions</div>
        <p style={{ fontSize: 13, lineHeight: 1.7, color: "rgba(237,233,223,0.6)", fontStyle: "italic", margin: 0 }}>{content.coachtip}</p>
      </div>
    </>
  );
}

function SignaturePanel({ signature, narrative }) {
  const sortedTypes = Object.entries(signature.typeLoad).sort((a, b) => b[1] - a[1]);
  const totalLoad = sortedTypes.reduce((s, [_, v]) => s + v, 0) || 1;

  return (
    <div style={{ maxWidth: 720, margin: "28px auto 0", background: PANEL, border: `1px solid ${GOLD}28`, borderRadius: 14, padding: "28px 28px 24px" }}>
      <div style={{ ...monoSmall, color: GOLD, marginBottom: 4 }}>Team Signature</div>
      <div style={{ fontSize: 22, fontWeight: 300, letterSpacing: "0.03em", marginBottom: 14 }}>
        The <em style={{ color: GOLD, fontStyle: "italic" }}>lived reality</em> of this team
      </div>
      <p style={{ fontSize: 14, lineHeight: 1.75, color: "rgba(237,233,223,0.72)", fontStyle: "italic", marginBottom: 22 }}>{narrative}</p>

      <div style={{ marginBottom: 22 }}>
        <div style={{ ...monoSmall, color: TEXT_DIMMER, marginBottom: 10 }}>Average frequency profile</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
          {FREQ.map(f => {
            const v = signature.avg[f.id] || 0;
            return (
              <div key={f.id} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <div style={{ width: 72, ...monoSmall, fontSize: 9, color: f.color, textAlign: "right" }}>{f.name}</div>
                <div style={{ flex: 1, height: 6, background: `${f.color}10`, borderRadius: 3, overflow: "hidden" }}>
                  <div style={{ height: "100%", width: `${v}%`, background: f.color, boxShadow: v >= 50 ? `0 0 6px ${f.color}` : "none" }}/>
                </div>
                <div style={{ width: 30, ...monoSmall, fontSize: 9, color: f.color, textAlign: "right" }}>{Math.round(v)}</div>
              </div>
            );
          })}
        </div>
      </div>

      <div>
        <div style={{ ...monoSmall, color: TEXT_DIMMER, marginBottom: 10 }}>Tension type distribution</div>
        <div style={{ display: "flex", height: 8, borderRadius: 4, overflow: "hidden", marginBottom: 10 }}>
          {sortedTypes.map(([type, val]) => (
            val > 0 && <div key={type} style={{ flex: val, background: T_COLORS[type] }} title={`${T_NAMES[type]}: ${Math.round(val / totalLoad * 100)}%`} />
          ))}
        </div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 10 }}>
          {sortedTypes.map(([type, val]) => (
            <div key={type} style={{ display: "flex", alignItems: "center", gap: 6, ...monoSmall, fontSize: 9, color: TEXT_DIM }}>
              <div style={{ width: 8, height: 8, borderRadius: 2, background: T_COLORS[type] }}/>
              {T_NAMES[type]} <span style={{ color: T_COLORS[type] }}>{Math.round(val / totalLoad * 100)}%</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function Legend() {
  return (
    <div style={{ display: "flex", flexWrap: "wrap", gap: 14, justifyContent: "center", marginTop: 32, paddingTop: 20, borderTop: `1px solid ${BORDER}` }}>
      {Object.entries(T_NAMES).map(([k, v]) => (
        <div key={k} style={{ display: "flex", alignItems: "center", gap: 6, ...monoSmall, fontSize: 9, color: TEXT_DIM }}>
          <span style={{ color: T_COLORS[k] }}>{T_ICONS[k]}</span> {v}
        </div>
      ))}
    </div>
  );
}


// ─── Mount ─────────────────────────────────────────────────────────────
const rootEl = document.getElementById('root');
const root = ReactDOM.createRoot(rootEl);
root.render(React.createElement(App));
</script>

</body>
</html>
